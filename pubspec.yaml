name: huaxia_footprint
description: "华夏足迹 - 踏寻千年足迹，穿越历史地理"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database (sqflite - no code generation needed)
  sqflite: ^2.4.1
  path: ^1.9.0

  # Map (AMap)
  amap_map: ^1.0.0
  x_amap_base: ^1.0.3

  # Routing
  go_router: ^14.8.0

  # Network
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Sharing
  share_plus: ^10.1.4

  # File system
  path_provider: ^2.1.0

  # Timezone
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/

  fonts:
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSerifSC-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSerifSC-Light.ttf
          weight: 300
